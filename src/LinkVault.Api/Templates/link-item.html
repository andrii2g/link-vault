<article class="card" data-link-id="{{id}}">
  <div class="card-header">
    <div class="meta-group">
      <div class="meta">Saved {{createdAt}}</div>
      {{updatedAtBlock}}
    </div>
    <button class="delete-button" type="button" data-delete-id="{{id}}">Delete</button>
  </div>
  {{titleBlock}}
  <a class="url" href="{{url}}">{{url}}</a>
  {{descriptionBlock}}
  {{tagsBlock}}
</article>
